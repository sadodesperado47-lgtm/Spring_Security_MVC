<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: calc(100vh - 56px); }
        .table thead th { font-weight: 600; }
    </style>
</head>
<body>

<!-- Верхняя панель -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="navbar-brand mb-0">

            <span class="fw-semibold"
                  th:text="${currentUser.username}">user@mail.ru</span>
            <span class="ms-2">with roles:</span>
            <span class="ms-1">

                <span class="me-1"
                      th:each="r : ${currentUser.roles}"
                      th:text="${#strings.replace(r.authority, 'ROLE_', '')}">USER</span>
            </span>
        </div>

        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit"
                    class="btn btn-link text-decoration-none text-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Левое меню -->
        <aside class="col-12 col-md-2 px-0 sidebar bg-light border-end">
            <div class="list-group rounded-0">
                <a th:href="@{/admin}"
                   class="list-group-item list-group-item-action active">Admin</a>
                <a th:href="@{/user}"
                   class="list-group-item list-group-item-action">User</a>
            </div>
        </aside>

        <!-- Контент -->
        <main class="col-12 col-md-10 p-4">
            <h2 class="mb-4">Admin panel</h2>

            <!-- Вкладки -->
            <ul class="nav nav-tabs mb-3">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin}"
                       aria-current="page">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/new}">New User</a>
                </li>
            </ul>

            <!-- Таблица пользователей -->
            <div class="card">
                <div class="card-header bg-white">
                    <strong>All users</strong>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped mb-0 align-middle">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th class="text-center">Edit</th>
                                <th class="text-center">Delete</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="u : ${users}">
                                <td th:text="${u.id}"></td>

                                <td th:text="${u.name}"></td>

                                <td th:text="${u.lastname}"></td>
                                <td th:text="${u.age}"></td>
                                <td th:text="${u.email}"></td>
                                <td>
                                    <span class="me-1"
                                          th:each="r : ${u.roles}"
                                          th:text="${#strings.replace(r.authority, 'ROLE_', '')}">
                                    </span>
                                </td>
                                <td class="text-center">
                                    <a class="btn btn-info btn-sm text-white"
                                       th:href="@{/admin/edit/{id}(id=${u.id})}">Edit</a>
                                </td>
                                <td class="text-center">

                                    <form th:action="@{/admin/delete/{id}(id=${u.id})}"
                                          method="post" class="d-inline">
                                        <button type="submit"
                                                class="btn btn-danger btn-sm">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
