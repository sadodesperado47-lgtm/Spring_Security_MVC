<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: calc(100vh - 56px); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="navbar-brand mb-0">

            <span class="fw-semibold"
                  th:text="${currentUser.username}">user@mail.ru</span>
            <span class="ms-2">with roles:</span>
            <span class="ms-1">
                <!-- ✅ ИЗМЕНЕНО: был ${#authentication.authorities} -->
                <span class="me-1"
                      th:each="r : ${currentUser.roles}"
                      th:text="${#strings.replace(r.authority, 'ROLE_', '')}">USER</span>
            </span>
        </div>

        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit"
                    class="btn btn-link text-decoration-none text-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <aside class="col-12 col-md-2 px-0 sidebar bg-light border-end">
            <div class="list-group rounded-0">
                <!-- ✅ Показываем Admin только для ROLE_ADMIN -->
                <th:block th:each="r : ${currentUser.roles}">
                    <a th:if="${r.authority == 'ROLE_ADMIN'}"
                       th:href="@{/admin}"
                       class="list-group-item list-group-item-action">Admin</a>
                </th:block>
                <a th:href="@{/user}"
                   class="list-group-item list-group-item-action active">User</a>
            </div>
        </aside>

        <main class="col-12 col-md-10 p-4">
            <h2 class="mb-4">User information</h2>

            <div class="card">
                <div class="card-header bg-white">
                    <strong>About user</strong>
                </div>
                <div class="card-body p-0">
                    <table class="table table-striped mb-0 align-middle">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>
                        <tbody>

                        <tr th:object="${currentUser}">
                            <td th:text="*{id}"></td>

                            <td th:text="*{name}"></td>

                            <td th:text="*{lastname}"></td>
                            <td th:text="*{age}"></td>
                            <td th:text="*{email}"></td>
                            <td>
                                <span class="me-1"
                                      th:each="r : *{roles}"
                                      th:text="${#strings.replace(r.authority, 'ROLE_', '')}">
                                </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
