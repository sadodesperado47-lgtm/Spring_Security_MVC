<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: calc(100vh - 56px); }
    </style>
</head>
<body>

<!-- Верхняя панель -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="navbar-brand mb-0">
            <span class="fw-semibold" sec:authentication="name">user@mail.ru</span>
            <span class="ms-2">with roles:</span>
            <span class="ms-1">
                <span class="me-1"
                      th:each="a : ${#authentication.authorities}"
                      th:text="${#strings.replace(a.authority, 'ROLE_', '')}">USER</span>
            </span>
        </div>

        <!-- Logout POST -->
        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-link text-decoration-none text-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Левое меню -->
        <aside class="col-12 col-md-2 px-0 sidebar bg-light border-end">
            <div class="list-group rounded-0">
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}" class="list-group-item list-group-item-action">Admin</a>
                <a th:href="@{/user}" class="list-group-item list-group-item-action active">User</a>
            </div>
        </aside>

        <!-- Контент -->
        <main class="col-12 col-md-10 p-4">
            <h2 class="mb-4">User information-page</h2>

            <div class="card">
                <div class="card-header bg-white">
                    <strong>About user</strong>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped mb-0 align-middle">
                            <thead>
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">First Name</th>
                                <th scope="col">Last Name</th>
                                <th scope="col">Age</th>
                                <th scope="col">Email</th>
                                <th scope="col">Role</th>
                            </tr>
                            </thead>
                            <tbody>
                            <!-- В модели ожидается атрибут user — текущий пользователь -->
                            <tr th:object="${user}">
                                <td th:text="*{id}">3</td>
                                <td th:text="*{firstName}">user</td>
                                <td th:text="*{lastName}">user</td>
                                <td th:text="*{age}">30</td>
                                <!-- Если логин хранится в username — замените *{email} на *{username} -->
                                <td th:text="${user.email != null ? user.email : user.username}">user@mail.ru</td>
                                <td>
                                    <span class="me-1"
                                          th:each="r : *{roles}"
                                          th:text="${#strings.replace((r.name != null ? r.name : (r.role != null ? r.role : r.toString())), 'ROLE_', '')}">
                                        USER
                                    </span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
