<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add new user</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: calc(100vh - 56px); }
        .table-form td:first-child { width: 220px; font-weight: 600; vertical-align: middle; }
    </style>
</head>
<body>

<!-- Верхняя панель -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="navbar-brand mb-0">
            <span class="fw-semibold" sec:authentication="name">user@mail.ru</span>
            <span class="ms-2">with roles:</span>
            <span class="ms-1">
                <span class="me-1"
                      th:each="a : ${#authentication.authorities}"
                      th:text="${#strings.replace(a.authority, 'ROLE_', '')}">USER</span>
            </span>
        </div>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-link text-decoration-none text-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Левое меню -->
        <aside class="col-12 col-md-2 px-0 sidebar bg-light border-end">
            <div class="list-group rounded-0">
                <a th:href="@{/admin}" class="list-group-item list-group-item-action">Admin</a>
                <a th:href="@{/user}" class="list-group-item list-group-item-action">User</a>
            </div>
        </aside>

        <!-- Контент -->
        <main class="col-12 col-md-10 p-4">
            <h2 class="mb-4">Admin panel</h2>

            <!-- Вкладки -->
            <ul class="nav nav-tabs mb-3">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin/new}" aria-current="page">New User</a>
                </li>
            </ul>

            <!-- Карточка "Add new user" -->
            <div class="card">
                <div class="card-header bg-white">
                    <strong>Add new user</strong>
                </div>
                <div class="card-body">
                    <!-- В модели ожидается атрибут user (пустой объект) и список ролей allRoles -->
                    <form th:action="@{/admin}" method="post" th:object="${user}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="table-responsive">
                            <table class="table table-borderless align-middle table-form mb-3">
                                <tbody>
                                <tr>
                                    <td>First Name</td>
                                    <td>
                                        <input type="text" class="form-control" th:field="*{firstName}" required>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Last Name</td>
                                    <td>
                                        <input type="text" class="form-control" th:field="*{lastName}" required>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Age</td>
                                    <td>
                                        <input type="number" class="form-control" th:field="*{age}" min="0" step="1" required>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Email</td>
                                    <td>
                                        <!-- Если в сущности поле называется username — замените на *{username} -->
                                        <input type="email" class="form-control" th:field="*{email}" required>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Password</td>
                                    <td>
                                        <input type="password" class="form-control" th:field="*{password}" required>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Role</td>
                                    <td>
                                        <!-- Множественный выбор ролей -->
                                        <select class="form-select" multiple size="2" th:field="*{roles}">
                                            <!-- Если у роли поле name = 'ROLE_USER'/'ROLE_ADMIN', используем его -->
                                            <option th:each="r : ${allRoles}"
                                                    th:value="${r.name}"
                                                    th:text="${#strings.replace(r.name, 'ROLE_', '')}">
                                                USER
                                            </option>
                                        </select>
                                        <div class="form-text">Зажмите Ctrl/Cmd для выбора нескольких ролей.</div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">Add new user</button>
                            <a th:href="@{/admin}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
