<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add new user</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: calc(100vh - 56px); }
    </style>
</head>
<body>

<!-- Верхняя панель -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="navbar-brand mb-0">

            <span class="fw-semibold"
                  th:text="${currentUser.username}">user@mail.ru</span>
            <span class="ms-2">with roles:</span>
            <span class="ms-1">

                <span class="me-1"
                      th:each="r : ${currentUser.roles}"
                      th:text="${#strings.replace(r.authority, 'ROLE_', '')}">USER</span>
            </span>
        </div>

        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit"
                    class="btn btn-link text-decoration-none text-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Левое меню -->
        <aside class="col-12 col-md-2 px-0 sidebar bg-light border-end">
            <div class="list-group rounded-0">
                <a th:href="@{/admin}"
                   class="list-group-item list-group-item-action">Admin</a>
                <a th:href="@{/user}"
                   class="list-group-item list-group-item-action">User</a>
            </div>
        </aside>

        <!-- Контент -->
        <main class="col-12 col-md-10 p-4">
            <h2 class="mb-4">Admin panel</h2>

            <ul class="nav nav-tabs mb-3">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page">New User</a>
                </li>
            </ul>

            <div class="card">
                <div class="card-header bg-white">
                    <strong>Add new user</strong>
                </div>
                <div class="card-body">

                    <form th:action="@{/admin}" method="post"
                          th:object="${newUser}">

                        <div class="mb-3">
                            <label class="form-label">First Name</label>

                            <input type="text" class="form-control"
                                   th:field="*{name}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Last Name</label>

                            <input type="text" class="form-control"
                                   th:field="*{lastname}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Age</label>
                            <input type="number" class="form-control"
                                   th:field="*{age}" min="0" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control"
                                   th:field="*{email}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control"
                                   th:field="*{username}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control"
                                   th:field="*{password}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Roles</label>

                            <div th:each="r : ${allRoles}" class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       name="roleIds"
                                       th:value="${r.id}"
                                       th:id="${'role-' + r.id}">
                                <label class="form-check-label"
                                       th:for="${'role-' + r.id}"
                                       th:text="${#strings.replace(r.authority, 'ROLE_', '')}">
                                </label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit"
                                    class="btn btn-success">Add new user</button>
                            <a th:href="@{/admin}"
                               class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
