<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background-color: #2c49e0; color: white; }
        .role-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            background-color: #0f3858;
            color: white;
            margin: 2px;
        }
        .btn { padding: 6px 12px; border: none; border-radius: 4px;
            cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-green  { background: #294ab6; color: white; }
        .btn-blue   { background: #2196F3; color: white; }
        .btn-red    { background: #d70f5c; color: white; }
        .btn-gray   { background: #9E9E9E; color: white; }
    </style>
</head>
<body>

<h1>USERS</h1>

<!--ФОРМА ДОБАВЛЕНИЯ ПОЛЬЗОВАТЕЛЯ-->
<form th:action="@{/admin}" method="post">

    <input type="text"     name="name"     placeholder="Имя"      required />
    <input type="text"     name="lastname" placeholder="Фамилия"   required />
    <input type="email"    name="email"    placeholder="E-Mail"     required />
    <input type="text"     name="username" placeholder="Логин"      required />
    <input type="password" name="password" placeholder="Пароль"     required />

    <!-- Чекбоксы ролей -->
    <span th:each="role : ${allRoles}">
        <input type="checkbox"
               name="roleIds"
               th:value="${role.id}"
               th:id="'new-role-' + ${role.id}" />
        <label th:for="'new-role-' + ${role.id}"
               th:text="${role.authority}">ROLE</label>
    </span>

    <button type="submit" class="btn btn-green">Добавить</button>
</form>

<br/>

<!-- ТАБЛИЦА ПОЛЬЗОВАТЕЛЕЙ-->
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Email</th>
        <th>Логин</th>
        <th>Роли</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>

    <tr th:each="user : ${users}">

        <!-- РЕЖИМ РЕДАКТИРОВАНИЯ-->
        <th:block th:if="${editUser != null and editUser.id == user.id}">

            <form th:action="@{/admin/edit}"
                  th:object="${editUser}"
                  method="post"
                  style="display: contents;">

                <td>
                    <input type="hidden" th:field="*{id}" />
                    <span th:text="${user.id}"></span>
                </td>

                <td><input type="text"  th:field="*{name}"     required /></td>
                <td><input type="text"  th:field="*{lastname}"  required /></td>
                <td><input type="email" th:field="*{email}"     required /></td>
                <td><input type="text"  th:field="*{username}"  required /></td>

                <!-- Чекбоксы ролей при редактировании -->

                <td>
                        <span th:each="role : ${allRoles}">
                            <input type="checkbox"
                                   name="roleIds"
                                   th:value="${role.id}"
                                   th:id="'edit-role-' + ${role.id}"
                                   th:checked="${editUser.roles.contains(role)}" />
                            <label th:for="'edit-role-' + ${role.id}"
                                   th:text="${role.authority}">ROLE</label>
                        </span>
                </td>

                <td>
                    <button type="submit" class="btn btn-blue">Сохранить</button>
                    <a th:href="@{/admin}" class="btn btn-gray">Отмена</a>
                </td>

            </form>
        </th:block>

        <!-- РЕЖИМ ПРОСМОТРА-->
        <th:block th:if="${editUser == null or editUser.id != user.id}">

            <td th:text="${user.id}"></td>
            <td th:text="${user.name}"></td>
            <td th:text="${user.lastname}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.username}"></td>

            <!-- Роли пользователя в виде значков -->
            <td>
                    <span th:each="role : ${user.roles}"
                          class="role-badge"
                          th:text="${role.authority}">
                    </span>
            </td>

            <td>
                <a th:href="@{/admin/edit/{id}(id=${user.id})}"
                   class="btn btn-blue">Изменить</a>

                <a th:href="@{/admin/delete/{id}(id=${user.id})}"
                   class="btn btn-red"
                   onclick="return confirm('Удалить?')">Удалить</a>
            </td>

        </th:block>

    </tr>

    </tbody>
</table>

</body>
</html>
