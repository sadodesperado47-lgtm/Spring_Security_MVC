<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit user</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

<!-- Верхняя панель -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="navbar-brand mb-0">
            <span class="fw-semibold" sec:authentication="name">user@mail.ru</span>
            <span class="ms-2">with roles:</span>
            <span class="ms-1">
                <span class="me-1"
                      th:each="a : ${#authentication.authorities}"
                      th:text="${#strings.replace(a.authority, 'ROLE_', '')}">USER</span>
            </span>
        </div>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-link text-decoration-none text-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Левое меню (для соответствия макету) -->
        <aside class="col-12 col-md-2 px-0 bg-light border-end">
            <div class="list-group rounded-0">
                <a th:href="@{/admin}" class="list-group-item list-group-item-action active">Admin</a>
                <a th:href="@{/user}" class="list-group-item list-group-item-action">User</a>
            </div>
        </aside>

        <!-- Контент (фон — как подложка под модальным окном) -->
        <main class="col-12 col-md-10 p-4">
            <h2 class="mb-4">Admin panel</h2>
        </main>
    </div>
</div>

<!-- Модальное окно редактирования -->
<div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content" th:object="${user}">
            <div class="modal-header">
                <h5 class="modal-title" id="editUserLabel">Edit user</h5>
                <a th:href="@{/admin}" class="btn-close" aria-label="Close"></a>
            </div>

            <form th:action="@{/admin/{id}(id=*{id})}" th:method="patch" method="post">
                <div class="modal-body">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label class="form-label">ID</label>
                        <input type="text" class="form-control" th:field="*{id}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">First name</label>
                        <input type="text" class="form-control" th:field="*{firstName}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Last name</label>
                        <input type="text" class="form-control" th:field="*{lastName}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" th:field="*{age}" min="0" step="1" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <!-- Если в сущности поле логина называется username — замените на *{username} -->
                        <input type="email" class="form-control" th:field="*{email}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" th:field="*{password}">
                        <div class="form-text">Оставьте пустым, чтобы не менять пароль.</div>
                    </div>

                    <div class="mb-1">
                        <label class="form-label">Role</label>
                        <!-- В модели ожидается список доступных ролей allRoles -->
                        <!-- Вариант через id роли: удобен для биндинга без кастомного конвертера -->
                        <select class="form-select" multiple size="2" name="roles"
                                th:field="*{roles}">
                            <option th:each="r : ${allRoles}"
                                    th:value="${r.id}"
                                    th:text="${#strings.replace(r.name, 'ROLE_', '')}"
                                    th:selected="${*{roles} != null and #lists.contains(*{roles.?[id != null].![id]}, r.id)}">
                                USER
                            </option>
                        </select>
                        <div class="form-text">Зажмите Ctrl/Cmd для выбора нескольких ролей.</div>
                    </div>

                </div>

                <div class="modal-footer">
                    <a th:href="@{/admin}" class="btn btn-secondary">Close</a>
                    <button type="submit" class="btn btn-primary">Edit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS + автопоказ модалки -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const modal = new bootstrap.Modal(document.getElementById('editUserModal'), {
            backdrop: 'static',
            keyboard: false
        });
        modal.show();
    });
</script>
</body>
</html>
