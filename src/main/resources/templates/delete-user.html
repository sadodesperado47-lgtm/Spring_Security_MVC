<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Delete user</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: calc(100vh - 56px); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="navbar-brand mb-0">

            <span class="fw-semibold"
                  th:text="${currentUser.username}">user@mail.ru</span>
            <span class="ms-2">with roles:</span>
            <span class="ms-1">
                <span class="me-1"
                      th:each="r : ${currentUser.roles}"
                      th:text="${#strings.replace(r.authority, 'ROLE_', '')}">USER</span>
            </span>
        </div>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit"
                    class="btn btn-link text-decoration-none text-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <aside class="col-12 col-md-2 px-0 sidebar bg-light border-end">
            <div class="list-group rounded-0">
                <a th:href="@{/admin}"
                   class="list-group-item list-group-item-action active">Admin</a>
                <a th:href="@{/user}"
                   class="list-group-item list-group-item-action">User</a>
            </div>
        </aside>

        <main class="col-12 col-md-10 p-4">
            <h2 class="mb-4">Admin panel</h2>

            <div class="card" style="max-width: 500px;">
                <div class="card-header bg-white">
                    <strong>Delete user</strong>
                </div>
                <div class="card-body">

                    <p class="mb-1">
                        Вы уверены, что хотите удалить пользователя?
                    </p>
                    <p class="fw-bold"
                       th:text="${deleteUser.username + ' (ID: ' + deleteUser.id + ')'}">
                    </p>


                    <form th:action="@{/admin/delete/{id}(id=${deleteUser.id})}"
                          method="post">
                        <div class="d-flex gap-2">
                            <button type="submit"
                                    class="btn btn-danger">Confirm Delete</button>
                            <a th:href="@{/admin}"
                               class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
