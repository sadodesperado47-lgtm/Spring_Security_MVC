<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin panel</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: calc(100vh - 56px); } /* минус высота навбара */
        .nav-link { cursor: pointer; }
        .table thead th { font-weight: 600; }
    </style>
</head>
<body>

<!-- Верхняя панель -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="navbar-brand mb-0">
            <span class="fw-semibold" sec:authentication="name">user@mail.ru</span>
            <span class="ms-2">with roles:</span>
            <span class="ms-1">
                <span class="me-1"
                      th:each="a : ${#authentication.authorities}"
                      th:text="${#strings.replace(a.authority, 'ROLE_', '')}">USER</span>
            </span>
        </div>

        <!-- Logout POST -->
        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-link text-decoration-none text-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Левое меню -->
        <aside class="col-12 col-md-2 px-0 sidebar bg-light border-end">
            <div class="list-group rounded-0">
                <a th:href="@{/admin}" class="list-group-item list-group-item-action active">Admin</a>
                <a th:href="@{/user}" class="list-group-item list-group-item-action">User</a>
            </div>
        </aside>

        <!-- Контент -->
        <main class="col-12 col-md-10 p-4">
            <h2 class="mb-4">Admin panel</h2>

            <!-- Вкладки -->
            <ul class="nav nav-tabs mb-3">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin}" aria-current="page">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/new}">New User</a>
                </li>
            </ul>

            <!-- Карточка со списком пользователей -->
            <div class="card">
                <div class="card-header bg-white">
                    <strong>All users</strong>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped mb-0 align-middle">
                            <thead>
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">First Name</th>
                                <th scope="col">Last Name</th>
                                <th scope="col">Age</th>
                                <th scope="col">Email</th>
                                <th scope="col">Role</th>
                                <th scope="col" class="text-center">Edit</th>
                                <th scope="col" class="text-center">Delete</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="u : ${users}">
                                <td th:text="${u.id}">1</td>
                                <td th:text="${u.firstName}">first</td>
                                <td th:text="${u.lastName}">last</td>
                                <td th:text="${u.age}">30</td>

                                <!-- Если в вашей модели email хранится в username, замените выражение -->
                                <td th:text="${u.email != null ? u.email : u.username}">user@mail.ru</td>

                                <!-- Вывод ролей без префикса ROLE_ -->
                                <td>
                                    <span class="me-1"
                                          th:each="r : ${u.roles}"
                                          th:text="${#strings.replace((r.name != null ? r.name : (r.role != null ? r.role : r.toString())), 'ROLE_', '')}">
                                        USER
                                    </span>
                                </td>

                                <td class="text-center">
                                    <a class="btn btn-info btn-sm text-white"
                                       th:href="@{/admin/{id}/edit(id=${u.id})}">Edit</a>
                                </td>
                                <td class="text-center">
                                    <form th:action="@{/admin/{id}(id=${u.id})}" th:method="delete" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Опционально: Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
